<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORD DUEL — 9개 언어 대결</title>
<style>
/* ==========================================================================
   WORD DUEL — tokens
   bg:      #12141c (ink navy)
   surface: #1b1e2b
   line:    #2c3044
   text:    #eef0f6
   muted:   #7d84a6
   red(shoot):  #ff4d4d
   mint(five):  #4dd4ac
   amber(robot/word): #ffb347
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;600;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #12141c;
  color: #eef0f6;
  font-family: 'Noto Sans KR', 'Space Grotesk', sans-serif;
  overflow: hidden;
  height: 100%;
  -webkit-tap-highlight-color: transparent;
}

#app {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh;
}

.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.screen.active { display: flex; }

kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  height: 28px;
  padding: 0 6px;
  border-radius: 6px;
  background: #23273a;
  border: 1px solid #3a3f5c;
  border-bottom: 3px solid #3a3f5c;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: #ffb347;
}

/* ---------- background texture ---------- */
.scanlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px),
    radial-gradient(ellipse at 50% -10%, rgba(255,179,71,0.09), transparent 55%),
    radial-gradient(ellipse at 85% 110%, rgba(77,212,172,0.08), transparent 55%);
}

/* ==========================================================================
   START SCREEN
   ========================================================================== */
#screen-start {
  align-items: center;
  justify-content: flex-start;
  padding: 0 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.start-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 28px 0 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  min-height: 0;
}

.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: #7d84a6;
  border: 1px solid #2c3044;
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 14px;
}
.logo-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #ffb347;
  box-shadow: 0 0 8px 2px rgba(255,179,71,0.7);
}

.title {
  margin: 0 0 8px;
  font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 26px;
  line-height: 1.2;
}
.title-line { display: block; }
.accent-mint { color: #4dd4ac; }
.accent-red { color: #ff4d4d; }

.subtitle {
  margin: 0 0 18px;
  color: #7d84a6;
  font-size: 13px;
}

.setup-card {
  width: 100%;
  background: #1b1e2b;
  border: 1px solid #2c3044;
  border-radius: 16px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  text-align: left;
  flex-shrink: 0;
}
.setup-row { display: flex; flex-direction: column; gap: 10px; }
.setup-label {
  font-size: 12px;
  letter-spacing: 0.06em;
  color: #7d84a6;
  font-weight: 600;
}

.lang-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.lang-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 10px 4px;
  border-radius: 10px;
  border: 1px solid #2c3044;
  background: #171a26;
  color: #eef0f6;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s, background 0.12s;
  font-family: inherit;
}
.lang-btn:active { transform: scale(0.96); }
.lang-btn .flag { font-size: 20px; }
.lang-btn .name { font-size: 11px; color: #7d84a6; }
.lang-btn.selected {
  border-color: #ffb347;
  background: rgba(255,179,71,0.12);
}
.lang-btn.selected .name { color: #ffb347; }

.hidden { display: none !important; }

.robot-mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.robot-mode-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 6px;
  border-radius: 10px;
  border: 1px solid #2c3044;
  background: #171a26;
  color: #eef0f6;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.robot-mode-btn span {
  font-size: 10.5px;
  font-weight: 400;
  color: #7d84a6;
}
.robot-mode-btn.active {
  border-color: #7c9bff;
  background: rgba(124,155,255,0.12);
  color: #7c9bff;
}
.robot-mode-btn.active span { color: #7c9bff; }

.robot-lang-grid {
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px dashed #2c3044;
}
.robot-lang-grid .lang-btn.selected {
  border-color: #7c9bff;
  background: rgba(124,155,255,0.12);
}
.robot-lang-grid .lang-btn.selected .name { color: #7c9bff; }

.diff-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.diff-btn {
  padding: 10px 4px;
  border-radius: 10px;
  border: 1px solid #2c3044;
  background: #171a26;
  color: #eef0f6;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.diff-btn span { font-size: 11px; color: #7d84a6; font-weight: 400; }
.diff-btn.active {
  border-color: #4dd4ac;
  background: rgba(77,212,172,0.12);
  color: #4dd4ac;
}
.diff-btn.active span { color: #4dd4ac; }

.btn-primary {
  margin-top: 16px;
  width: 100%;
  max-width: 480px;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(180deg, #ffc266, #ffb347);
  color: #12141c;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(255,179,71,0.25);
}
.btn-primary:disabled {
  background: #2c3044;
  color: #7d84a6;
  box-shadow: none;
  cursor: not-allowed;
}
.btn-primary:active:not(:disabled) { transform: scale(0.98); }

.btn-ghost {
  width: 100%;
  max-width: 480px;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #2c3044;
  background: transparent;
  color: #eef0f6;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
}

.key-hint {
  margin-top: 14px;
  display: flex;
  gap: 22px;
  flex-wrap: wrap;
  justify-content: center;
}
.key-hint-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #7d84a6;
}

/* ==========================================================================
   GAME SCREEN — HUD
   ========================================================================== */
.hud {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid #2c3044;
  background: #14161f;
  z-index: 5;
}
.hud-block {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 46px;
}
.hud-timer-block { flex: 1; }
.hud-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #7d84a6;
}
.hud-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
}
#hud-score.score-pop { animation: scorePop 0.35s ease; }
@keyframes scorePop {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.timer-bar-track {
  height: 8px;
  border-radius: 5px;
  background: #23273a;
  overflow: hidden;
  margin-top: 4px;
}
.timer-bar-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #4dd4ac, #ffb347);
  border-radius: 5px;
  transition: width 0.1s linear, background 0.3s;
  transform-origin: left;
}
.timer-bar-fill.warn { background: linear-gradient(90deg, #ff4d4d, #ffb347); }

.btn-quit {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid #2c3044;
  background: #1b1e2b;
  color: #7d84a6;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
}

/* ==========================================================================
   STAGE
   ========================================================================== */
.stage {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 16px 6px;
  overflow: hidden;
}

.prompt-zone {
  text-align: center;
  margin-bottom: 6px;
  z-index: 3;
}
.prompt-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: #7d84a6;
  margin-bottom: 8px;
}
.prompt-label span { color: #ffb347; font-weight: 700; }

.prompt-card {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  border-radius: 14px;
  background: #1b1e2b;
  border: 2px solid #ffb347;
  box-shadow: 0 0 24px rgba(255,179,71,0.18);
}
#prompt-word {
  font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: #ffb347;
  word-break: keep-all;
}
.mini-speaker {
  border: none;
  background: transparent;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.8;
  padding: 4px;
}

.robot-stage {
  position: relative;
  flex: 1;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 2%;
  padding-bottom: 60px;
  min-height: 0;
}

.stage-floor {
  position: absolute;
  bottom: 6px;
  width: 70%;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.06), transparent 70%);
}

.robot {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.4s cubic-bezier(.36,.07,.19,.97);
  animation: robotFloat 3.2s ease-in-out infinite;
  transform: scale(0.72);
  opacity: 0.92;
  filter: brightness(0.94);
}
@keyframes robotFloat {
  0%, 100% { transform: scale(0.72) translateY(0); }
  50% { transform: scale(0.72) translateY(-6px); }
}
.robot-svg {
  width: 130px;
  height: 168px;
  color: #eef0f6;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.4));
}
#robot-eye-l, #robot-eye-r {
  fill: #ffb347;
  stroke: #ffb347;
  transition: fill 0.2s, stroke 0.2s;
  transform-origin: center;
}
.robot-arm-l, .robot-hand-l { transform-origin: 55px 115px; }

.robot-sign {
  position: absolute;
  top: auto;
  bottom: -54px;
  left: 50%;
  transform: translateX(-50%);
  right: auto;
  background: #1b1e2b;
  border: 2px solid #eef0f6;
  border-radius: 10px;
  padding: 10px 18px;
  min-width: 96px;
  max-width: 260px;
  text-align: center;
  box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}
#robot-word {
  font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 40px;
  line-height: 1.15;
  word-break: keep-all;
}
.robot-sign.talking #robot-word { animation: signPulse 0.5s ease-in-out infinite; }
@keyframes signPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.robot-boom {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 90px;
  opacity: 0;
  pointer-events: none;
}
.robot-boom.play {
  animation: boomPop 0.6s cubic-bezier(.2,1.4,.4,1) forwards;
}
@keyframes boomPop {
  0% { transform: translate(-50%,-50%) scale(0.2); opacity: 0; }
  30% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
}

/* robot state animations */
.robot.state-explode .robot-svg { animation: robotShake 0.5s ease; }
@keyframes robotShake {
  0%,100% { transform: translate(0,0) rotate(0); }
  20% { transform: translate(-6px,2px) rotate(-4deg); }
  40% { transform: translate(6px,-2px) rotate(4deg); }
  60% { transform: translate(-4px,2px) rotate(-3deg); }
  80% { transform: translate(4px,0) rotate(2deg); }
}
.robot.state-turn-away {
  animation: turnAway 0.7s ease forwards;
}
@keyframes turnAway {
  0% { transform: scale(0.72) scaleX(1) translateX(0); }
  40% { transform: scale(0.72) scaleX(-1) translateX(0); }
  100% { transform: scale(0.72) scaleX(-1) translateX(60px); opacity: 0.15; }
}
.robot.state-highfive .robot-arm-l,
.robot.state-highfive .robot-hand-l {
  animation: armRaise 0.35s ease forwards;
}
@keyframes armRaise {
  to { transform: rotate(-70deg) translate(6px,-10px); }
}
.hive-spark {
  position: absolute;
  left: 50%;
  top: 32%;
  transform: translate(-50%,-50%) scale(0);
  font-size: 46px;
  opacity: 0;
  pointer-events: none;
}
.hive-spark.play {
  animation: hiveSparkPlay 0.5s ease-out forwards;
}
@keyframes hiveSparkPlay {
  0% { transform: translate(-50%,-50%) scale(0.2) rotate(0deg); opacity: 0; }
  30% { transform: translate(-50%,-50%) scale(1.3) rotate(15deg); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1.6) rotate(30deg); opacity: 0; }
}
.robot.state-shot .robot-svg {
  animation: hitFlash 0.4s ease;
}
@keyframes hitFlash {
  0%, 100% { filter: drop-shadow(0 6px 16px rgba(0,0,0,0.4)); }
  30% { filter: drop-shadow(0 0 18px rgba(255,77,77,0.9)) brightness(1.8); }
}
.robot.reset-in {
  animation: robotEnter 0.5s ease;
}
@keyframes robotEnter {
  from { transform: scale(0.72) translateX(60px); opacity: 0; }
  to { transform: scale(0.72) translateX(0); opacity: 1; }
}

/* ---------- FX layer ---------- */
.fx-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  overflow: hidden;
}

.fx-gun, .fx-hand {
  position: absolute;
  left: 50%;
  bottom: 6%;
  transform: translate(-50%, 120%) scale(0.6) rotate(0deg);
  opacity: 0;
}
.fx-gun {
  left: 2%;
  bottom: -2%;
}
.fx-hand {
  font-size: 92px;
}
.pistol-svg {
  width: 190px;
  height: auto;
  display: block;
  filter: drop-shadow(0 10px 14px rgba(0,0,0,0.55));
  transform: scaleX(-1) scaleY(-1) rotate(-235deg); /* -15분(반시계 90도) 회전하여 총구가 로봇을 향하도록 */
  transform-origin: 70% 70%;
}
.muzzle-flash {
  opacity: 0;
  transform-origin: 222px 46px;
}
.fx-gun.fire .muzzle-flash {
  animation: muzzleFlashPlay 0.5s ease-out forwards;
  animation-delay: 0.16s;
}
@keyframes muzzleFlashPlay {
  0% { opacity: 0; transform: scale(0.3); }
  12% { opacity: 1; transform: scale(1.3) rotate(-8deg); }
  30% { opacity: 0.9; transform: scale(1) rotate(6deg); }
  55% { opacity: 0; transform: scale(0.6); }
  100% { opacity: 0; transform: scale(0.4); }
}
.fx-gun.fire {
  animation: gunFire 0.5s cubic-bezier(.2,1,.3,1) forwards;
}
@keyframes gunFire {
  0% { transform: translate(0,60%) scale(0.7) rotate(-4deg); opacity: 0; }
  35% { transform: translate(0,0%) scale(1) rotate(0deg); opacity: 1; }
  45% { transform: translate(-4%,-3%) scale(1.03) rotate(-7deg); opacity: 1; }
  60% { transform: translate(-1%,-1%) scale(1.01) rotate(-2deg); opacity: 1; }
  85% { transform: translate(0,0%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(0,0%) scale(1) rotate(0deg); opacity: 1; }
}
.fx-hand.raise {
  animation: handRaise 0.5s cubic-bezier(.2,1,.3,1) forwards;
}
@keyframes handRaise {
  0% { transform: translate(-50%,120%) scale(0.5); opacity: 0; }
  40% { transform: translate(-58%,-38%) scale(1.15); opacity: 1; }
  100% { transform: translate(-62%,-46%) scale(1.2); opacity: 1; }
}
.fx-hand.retreat {
  animation: handRetreat 0.4s ease forwards;
}
@keyframes handRetreat {
  from { transform: translate(-62%,-46%) scale(1.2); opacity: 1; }
  to { transform: translate(-50%,120%) scale(0.5); opacity: 0; }
}
.fx-hand.miss {
  animation: handMiss 0.6s cubic-bezier(.3,1,.4,1) forwards;
  filter: grayscale(0.4);
}
@keyframes handMiss {
  0% { transform: translate(-50%,120%) scale(0.5) rotate(0deg); opacity: 0; }
  35% { transform: translate(-56%,-30%) scale(1.1) rotate(-6deg); opacity: 1; }
  50% { transform: translate(-52%,-26%) scale(1.05) rotate(10deg); opacity: 1; }
  100% { transform: translate(-50%,110%) scale(0.6) rotate(4deg); opacity: 0; }
}

.fx-bullet {
  position: absolute;
  left: 10%;
  bottom: 12%;
  width: 14px; height: 6px;
  border-radius: 3px;
  background: #ffe08a;
  box-shadow: 0 0 10px 2px rgba(255,224,138,0.8);
  transform: translate(-50%, 0) rotate(38deg);
  opacity: 0;
}
.fx-bullet.shoot {
  animation: bulletTravel 0.32s linear forwards;
}
@keyframes bulletTravel {
  0% { left: 10%; bottom: 12%; transform: translate(-50%, 0) rotate(38deg) scale(1); opacity: 1; }
  100% { left: 46%; bottom: 62%; transform: translate(-50%, 0) rotate(38deg) scale(0.6); opacity: 0; }
}

.fx-result {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%,-50%) scale(0.4);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 800;
  font-size: 40px;
  opacity: 0;
  text-align: center;
  white-space: nowrap;
}
.fx-result.show-correct {
  color: #4dd4ac;
  text-shadow: 0 0 24px rgba(77,212,172,0.6);
  animation: resultPop 0.7s cubic-bezier(.2,1.4,.4,1) forwards;
}
.fx-result.show-wrong {
  color: #ff4d4d;
  text-shadow: 0 0 24px rgba(255,77,77,0.6);
  animation: resultPop 0.7s cubic-bezier(.2,1.4,.4,1) forwards;
}
.fx-result.show-timeout {
  color: #7d84a6;
  animation: resultPop 0.7s cubic-bezier(.2,1.4,.4,1) forwards;
}
@keyframes resultPop {
  0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
  35% { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  60% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%,-65%) scale(1); opacity: 0; }
}

/* ==========================================================================
   ACTION BAR
   ========================================================================== */
.action-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
  border-top: 1px solid #2c3044;
  background: #14161f;
}
.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 8px;
  border-radius: 16px;
  border: 2px solid;
  font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  background: #1b1e2b;
}
.action-icon { font-size: 26px; }
.action-text { font-size: 13px; }
.action-kbd {
  position: absolute;
  top: 8px;
  right: 10px;
}
.action-shoot {
  border-color: #ff4d4d;
  color: #ff4d4d;
}
.action-shoot:active { background: rgba(255,77,77,0.16); transform: scale(0.97); }
.action-five {
  border-color: #4dd4ac;
  color: #4dd4ac;
}
.action-five:active { background: rgba(77,212,172,0.16); transform: scale(0.97); }
.action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ==========================================================================
   OVER SCREEN
   ========================================================================== */
#screen-over {
  align-items: center;
  justify-content: center;
}

    if (!state.promptLang) {
      el.btnStart.disabled = true;
      el.btnStart.textContent = "제시 언어를 선택하세요";
      return;
    }
    if (state.robotMode === "fixed" && !state.robotFixedLang) {
      el.btnStart.disabled = true;
      el.btnStart.textContent = "로봇 언어를 선택하세요";
      return;
    }
    el.btnStart.disabled = false;
    if (state.robotMode === "fixed") {
      el.btnStart.textContent =
        LANG_MAP[state.promptLang].name + " vs " + LANG_MAP[state.robotFixedLang].name + " 대결 시작";
    } else {
      el.btnStart.textContent = LANG_MAP[state.promptLang].name + "로 대결 시작";
    }
  }

  function bindDiffButtons() {
    var btns = el.diffGrid.querySelectorAll(".diff-btn");
    btns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        btns.forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        state.difficulty = btn.dataset.diff;
      });
    });
  }

  /* ============================================================
     SFX ENGINE (Web Audio API — synthesized, no external files)
     ============================================================ */
  var audioCtx = null;
  var masterGain = null;
  function getAudioCtx() {
    if (!audioCtx) {
      try {
        var Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
        var compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.value = -24;
        compressor.knee.value = 10;
        compressor.ratio.value = 14;
        compressor.attack.value = 0.001;
        compressor.release.value = 0.1;
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 2.4;
        masterGain.connect(compressor);
        compressor.connect(audioCtx.destination);
      } catch (e) {
        audioCtx = null;
      }
    }
    if (audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function unlockAudio() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var resumeIt = function () {
      // 무음 버퍼를 한 번 재생해 iOS/Safari 등에서 오디오 파이프라인을 확실히 연다
      try {
        var buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
        var src = ctx.createBufferSource();
        src.buffer = buffer;
        src.connect(ctx.destination);
        src.start(0);
      } catch (e) {}
    };
    if (ctx.state === "suspended") {
      ctx.resume().then(resumeIt).catch(resumeIt);
    } else {
      resumeIt();
    }
  }

  function noiseBuffer(ctx, duration) {
    var bufferSize = Math.max(1, Math.floor(ctx.sampleRate * duration));
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    return buffer;
  }

  function playTone(opts) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var now = ctx.currentTime + (opts.delay || 0);
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = opts.type || "sine";
    osc.frequency.setValueAtTime(opts.freqStart, now);
    osc.frequency.exponentialRampToValueAtTime(
      Math.max(1, opts.freqEnd || opts.freqStart), now + (opts.duration || 0.2)
    );
    var peak = opts.volume != null ? opts.volume : 1;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(peak, now + (opts.attack || 0.008));
    gain.gain.exponentialRampToValueAtTime(0.0001, now + (opts.duration || 0.2));
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + (opts.duration || 0.2) + 0.05);
  }

  function playNoiseBurst(opts) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var now = ctx.currentTime + (opts.delay || 0);
    var duration = opts.duration || 0.2;
    var src = ctx.createBufferSource();
    src.buffer = noiseBuffer(ctx, duration);
    var filter = ctx.createBiquadFilter();
    filter.type = opts.filterType || "bandpass";
    filter.frequency.setValueAtTime(opts.freqStart || 1200, now);
    if (opts.freqEnd != null) {
      filter.frequency.exponentialRampToValueAtTime(Math.max(1, opts.freqEnd), now + duration);
    }
    filter.Q.value = opts.q != null ? opts.q : 1;
    var gain = ctx.createGain();
    var peak = opts.volume != null ? opts.volume : 1;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(peak, now + (opts.attack || 0.005));
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    src.start(now);
    src.stop(now + duration + 0.05);
  }

  function playSubBoom(opts) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    var now = ctx.currentTime + (opts.delay || 0);
    var duration = opts.duration || 0.5;
    var osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(opts.freqStart || 120, now);
    osc.frequency.exponentialRampToValueAtTime(opts.freqEnd || 30, now + duration);
    var gain = ctx.createGain();
    var peak = opts.volume != null ? opts.volume : 1;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(peak, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + duration + 0.05);
  }

  /* ---- SFX presets ---- */
  function sfxGunshot() {
    // 크고 강렬한 총성: 노이즈 크랙 + 저음 펀치 + 하이 스냅
    playNoiseBurst({ freqStart: 3500, freqEnd: 600, duration: 0.14, q: 0.7, volume: 1.4, filterType: "bandpass" });
    playSubBoom({ freqStart: 150, freqEnd: 45, duration: 0.22, volume: 1.3 });
    playTone({ type: "square", freqStart: 900, freqEnd: 120, duration: 0.09, volume: 0.8, delay: 0.0 });
  }

  function sfxExplosion() {
    // 아주 크고 묵직한 폭발음
    playNoiseBurst({ freqStart: 2000, freqEnd: 120, duration: 0.55, q: 0.5, volume: 1.6, filterType: "lowpass" });
    playSubBoom({ freqStart: 180, freqEnd: 25, duration: 0.7, volume: 1.6 });
    playNoiseBurst({ freqStart: 6000, freqEnd: 2000, duration: 0.08, q: 1.2, volume: 1.1, delay: 0.0, filterType: "highpass" });
    playSubBoom({ freqStart: 90, freqEnd: 20, duration: 0.9, volume: 1.0, delay: 0.08 });
  }

  function sfxHighFiveSuccess() {
    // 경쾌한 짝! 타격음 + 상승 차임
    playNoiseBurst({ freqStart: 2600, freqEnd: 1400, duration: 0.09, q: 1.5, volume: 1.3, filterType: "bandpass" });
    playTone({ type: "triangle", freqStart: 520, freqEnd: 780, duration: 0.14, volume: 1.0, delay: 0.03 });
    playTone({ type: "sine", freqStart: 780, freqEnd: 1040, duration: 0.18, volume: 0.9, delay: 0.09 });
    playTone({ type: "sine", freqStart: 1040, freqEnd: 1400, duration: 0.2, volume: 0.8, delay: 0.15 });
  }

  function sfxTurnAway() {
    // 로봇이 홱 돌아서 가버림: 뚝 끊기는 하강음
    playTone({ type: "sawtooth", freqStart: 500, freqEnd: 90, duration: 0.28, volume: 1.0 });
    playNoiseBurst({ freqStart: 800, freqEnd: 200, duration: 0.12, q: 0.8, volume: 0.7, delay: 0.02 });
  }

  function sfxTimeout() {
    // 경고 부저음
    playTone({ type: "square", freqStart: 260, freqEnd: 260, duration: 0.14, volume: 0.9 });
    playTone({ type: "square", freqStart: 260, freqEnd: 260, duration: 0.14, volume: 0.9, delay: 0.18 });
  }

  function sfxRoundStart() {
    playTone({ type: "sine", freqStart: 440, freqEnd: 660, duration: 0.12, volume: 0.55 });
  }

  function sfxCountdownTick() {
    playTone({ type: "square", freqStart: 880, freqEnd: 880, duration: 0.05, volume: 0.4 });
  }

  /* ============================================================
     TTS (Web Speech API)
     ============================================================ */
  var voicesReady = false;
  function initVoices() {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function () {
      voicesReady = true;
    };
  }

  function speak(text, langCode, opts) {
    if (!("speechSynthesis" in window)) return;
    opts = opts || {};
    try {
      window.speechSynthesis.cancel();
      var utt = new SpeechSynthesisUtterance(text);
      utt.lang = LANG_MAP[langCode] ? LANG_MAP[langCode].tts : "en-US";
      utt.rate = opts.rate || 0.95;
      utt.pitch = opts.pitch || 1;
      var voices = window.speechSynthesis.getVoices();
      var match = voices.find(function (v) { return v.lang === utt.lang; });
      if (!match) {
        match = voices.find(function (v) {
          return v.lang && v.lang.split("-")[0] === utt.lang.split("-")[0];
        });
      }
      if (match) utt.voice = match;
      if (opts.onend) utt.onend = opts.onend;
      window.speechSynthesis.speak(utt);
    } catch (e) {
      // ignore TTS errors silently, game still works visually
    }
  }

  var robotLoopTimer = null;
  function startRobotLoop(text, langCode) {
    stopRobotLoop();
    el.robotSign.classList.add("talking");
    function loop() {
      speak(text, langCode, {
        rate: 0.85,
        onend: function () {
          robotLoopTimer = setTimeout(loop, 550);
        }
      });
    }
    loop();
  }
  function stopRobotLoop() {
    if (robotLoopTimer) clearTimeout(robotLoopTimer);
    robotLoopTimer = null;
    el.robotSign.classList.remove("talking");
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  }

  /* ============================================================
     GAME FLOW
     ============================================================ */
  function startGame() {
    unlockAudio();
    state.score = 0;
    state.round = 0;
    state.correct = 0;
    state.wrong = 0;
    state.timeout = 0;
    state.usedIds = [];
    state.totalTime = DIFFICULTY[state.difficulty].seconds;
    updateHud();
    showScreen("game");
    nextRound();
  }

  function pickEntry() {
    var pool = WORDS.filter(function (w) { return state.usedIds.indexOf(w.id) === -1; });
    if (pool.length === 0) {
      state.usedIds = [];
      pool = WORDS.slice();
    }
    var entry = pool[Math.floor(Math.random() * pool.length)];
    state.usedIds.push(entry.id);
    return entry;
  }

  function pickRobotLang(excludeCode) {
    if (state.robotMode === "fixed" && state.robotFixedLang) {
      return state.robotFixedLang;
    }
    var options = LANGS.filter(function (l) { return l.code !== excludeCode; });
    return options[Math.floor(Math.random() * options.length)].code;
  }

  function nextRound() {
    resetRobotVisual();
    state.round += 1;
    el.hudRound.textContent = state.round;
    sfxRoundStart();

    var entry = pickEntry();
    state.currentEntry = entry;

    // 50% same meaning, 50% different meaning (different id's word in robot lang)
    var same = Math.random() < 0.5;
    state.isSameMeaning = same;

    var robotLang = pickRobotLang(state.promptLang);
    state.currentRobotLang = robotLang;

    var robotEntry;
    if (same) {
      robotEntry = entry;
    } else {
      var others = WORDS.filter(function (w) { return w.id !== entry.id; });
      robotEntry = others[Math.floor(Math.random() * others.length)];
    }

    var promptText = entry[state.promptLang];
    var robotText = robotEntry[robotLang];

    el.promptLangLabel.textContent = LANG_MAP[state.promptLang].name;
    el.promptWord.textContent = promptText;
    el.robotWord.textContent = robotText;

    state.roundActive = true;
    setActionButtonsEnabled(true);

    var robotStarted = false;
    function beginRobotSpeech() {
      if (robotStarted) return;
      robotStarted = true;
      startRobotLoop(robotText, robotLang);
    }

    speak(promptText, state.promptLang, {
      rate: 0.95,
      onend: function () {
        setTimeout(beginRobotSpeech, 250);
      }
    });
    // 안전장치: TTS가 재생되지 않거나 onend가 발생하지 않는 환경 대비 폴백
    setTimeout(beginRobotSpeech, 2200);

    startTimer();
  }

  function startTimer() {
    clearInterval(state.timerId);
    state.timeLeft = state.totalTime;
    var totalMs = state.totalTime * 1000;
    var startTs = Date.now();
    el.timerBar.style.width = "100%";
    el.timerBar.classList.remove("warn");

    state.timerId = setInterval(function () {
      var elapsed = Date.now() - startTs;
      var remaining = Math.max(0, totalMs - elapsed);
      var pct = (remaining / totalMs) * 100;
      el.timerBar.style.width = pct + "%";
      if (pct < 30) el.timerBar.classList.add("warn");
      if (remaining <= 0) {
        clearInterval(state.timerId);
        handleTimeout();
      }
    }, 60);
  }

  function stopTimer() {
    clearInterval(state.timerId);
  }

  function setActionButtonsEnabled(enabled) {
    el.btnShoot.disabled = !enabled;
    el.btnFive.disabled = !enabled;
  }

  function updateHud() {
    el.hudScore.textContent = state.score;
  }

  function bumpScore(delta) {
    state.score += delta;
    if (state.score < 0) state.score = state.score; // allow negative, natural for game
    updateHud();
    el.hudScore.classList.remove("score-pop");
    void el.hudScore.offsetWidth;
    el.hudScore.classList.add("score-pop");
  }

  /* ============================================================
     ACTIONS
     ============================================================ */
  function handleShoot() {
    if (!state.roundActive) return;
    resolveRound("shoot");
  }
  function handleFive() {
    if (!state.roundActive) return;
    resolveRound("five");
  }
  function handleTimeout() {
    if (!state.roundActive) return;
    resolveRound("timeout");
  }

  function resolveRound(action) {
    state.roundActive = false;
    setActionButtonsEnabled(false);
    stopTimer();
    stopRobotLoop();

    var userSaysDifferent = action === "shoot";
    var userSaysSame = action === "five";
    var actuallySame = state.isSameMeaning;
    var isCorrect = false;

    if (action === "timeout") {
      state.timeout += 1;
      bumpScore(-5);
      playFx("timeout");
      showResultText("TIME OUT", "show-timeout");
    } else {
      isCorrect = (userSaysDifferent && !actuallySame) || (userSaysSame && actuallySame);
      if (isCorrect) {
        state.correct += 1;
        bumpScore(5);
      } else {
        state.wrong += 1;
        bumpScore(-5);
      }
      if (action === "shoot") {
        playShootFx(isCorrect);
      } else {
        playFiveFx(isCorrect);
      }
      showResultText(isCorrect ? "CORRECT +5" : "WRONG -5", isCorrect ? "show-correct" : "show-wrong");
    }

    setTimeout(function () {
      nextRound();
    }, 1350);
  }

  /* ============================================================
     FX
     ============================================================ */
  function resetRobotVisual() {
    el.robot.classList.remove(
      "state-explode", "state-turn-away", "state-highfive", "state-shot", "reset-in"
    );
    el.robotBoom.classList.remove("play");
    el.fxGun.classList.remove("fire");
    el.fxHand.classList.remove("raise", "retreat", "miss");
    el.fxBullet.classList.remove("shoot");
    el.fxResult.classList.remove("show-correct", "show-wrong", "show-timeout");
    el.hiveSpark.classList.remove("play");
    el.robot.style.opacity = "1";
    el.robot.style.transform = "";
    void el.robot.offsetWidth;
    el.robot.classList.add("reset-in");
  }

  function playShootFx(isCorrect) {
    el.fxGun.classList.add("fire");
    sfxGunshot();
    setTimeout(function () {
      el.fxBullet.classList.add("shoot");
    }, 180);
    if (isCorrect) {
      // 판단 정확: 다른 단어였음 -> 명중
      setTimeout(function () {
        el.robot.classList.add("state-shot");
      }, 380);
    } else {
      // 판단 오류: 사실 같은 단어였음 -> 총 폭발
      setTimeout(function () {
        el.robot.classList.add("state-explode");
        el.robotBoom.classList.add("play");
        el.fxGun.style.filter = "brightness(0.3)";
        sfxExplosion();
        shakeScreen();
      }, 300);
      setTimeout(function () { el.fxGun.style.filter = ""; }, 900);
    }
  }

  function playFiveFx(isCorrect) {
    if (isCorrect) {
      el.fxHand.classList.add("raise");
      // 판단 정확: 같은 단어였음 -> 로봇도 하이파이브 + 단어 외침
      setTimeout(function () {
        el.robot.classList.add("state-highfive");
        sfxHighFiveSuccess();
        speak(state.currentEntry[state.currentRobotLang], state.currentRobotLang, { rate: 1, pitch: 1.15 });
      }, 300);
      setTimeout(function () {
        el.hiveSpark.classList.add("play");
      }, 340);
      setTimeout(function () {
        el.fxHand.classList.add("retreat");
      }, 850);
    } else {
      el.fxHand.classList.add("miss");
      // 판단 오류: 사실 다른 단어였음 -> 로봇이 손을 무시하고 홱 돌아서 가버림
      setTimeout(function () {
        el.robot.classList.add("state-turn-away");
        sfxTurnAway();
      }, 220);
    }
  }

  function playFx(type) {
    if (type === "timeout") {
      el.robot.classList.add("state-turn-away");
      sfxTimeout();
    }
  }

  function showResultText(text, cls) {
    el.fxResult.textContent = text;
    el.fxResult.classList.remove("show-correct", "show-wrong", "show-timeout");
    void el.fxResult.offsetWidth;
    el.fxResult.classList.add(cls);
  }

  function shakeScreen() {
    document.body.style.transition = "transform 0.06s";
    var shakes = [[-6,0],[6,0],[-4,0],[4,0],[0,0]];
    var i = 0;
    function step() {
      if (i >= shakes.length) {
        document.body.style.transform = "";
        return;
      }
      document.body.style.transform = "translate(" + shakes[i][0] + "px," + shakes[i][1] + "px)";
      i++;
      setTimeout(step, 45);
    }
    step();
  }

  function replayPrompt() {
    if (!state.currentEntry) return;
    speak(state.currentEntry[state.promptLang], state.promptLang, { rate: 0.95 });
  }

  /* ============================================================
     GAME OVER
     ============================================================ */
  function endGame() {
    stopTimer();
    stopRobotLoop();
    state.roundActive = false;
    el.overScore.textContent = state.score;
    el.statCorrect.textContent = state.correct;
    el.statWrong.textContent = state.wrong;
    el.statTimeout.textContent = state.timeout;
    showScreen("over");
  }

  /* ============================================================
     KEYBOARD
     ============================================================ */
  function bindKeyboard() {
    document.addEventListener("keydown", function (e) {
      if (!el.screenGame.classList.contains("active")) return;
      var key = e.key.toLowerCase();
      if (key === "f") {
        e.preventDefault();
        handleShoot();
      } else if (key === "j") {
        e.preventDefault();
        handleFive();
      }
    });
  }

  /* ============================================================
     INIT
     ============================================================ */
  function init() {
    cacheDom();
    buildLangGrid();
    buildRobotLangGrid();
    bindRobotModeButtons();
    bindDiffButtons();
    initVoices();
    bindKeyboard();

    // 브라우저 오디오 자동재생 정책 대응: 최초 사용자 상호작용 시 오디오 언락
    var unlockOnce = function () {
      unlockAudio();
      document.removeEventListener("pointerdown", unlockOnce);
      document.removeEventListener("keydown", unlockOnce);
    };
    document.addEventListener("pointerdown", unlockOnce, { once: true });
    document.addEventListener("keydown", unlockOnce, { once: true });

    el.btnStart.addEventListener("click", startGame);
    el.btnQuit.addEventListener("click", endGame);
    el.btnShoot.addEventListener("click", handleShoot);
    el.btnFive.addEventListener("click", handleFive);
    el.btnReplayPrompt.addEventListener("click", replayPrompt);
    el.btnRetry.addEventListener("click", function () {
      showScreen("game");
      startGame();
    });
    el.btnHome.addEventListener("click", function () {
      showScreen("start");
    });

    showScreen("start");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

</script>
</body>
